
services:
  db:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_DB: legal_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: "no"
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://postgres:postgres@db:5432/legal_crm
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    volumes:
      - ./backend:/app
      - media_files_dev:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    restart: "no"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio-password
    volumes:
      - minio_data_dev:/data
    command: server /data --console-address ":9001"

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      until /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-minio-password} 2>/dev/null; do
        sleep 1;
      done;
      /usr/bin/mc mb myminio/${MINIO_STORAGE_BUCKET_NAME:-legal-crm-media} --ignore-existing;
      /usr/bin/mc anonymous set public myminio/${MINIO_STORAGE_BUCKET_NAME:-legal-crm-media};
      exit 0;
      "

volumes:
  postgres_data_dev:
  minio_data_dev:
  media_files_dev:
